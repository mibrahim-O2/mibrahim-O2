<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#D4AF37"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1 0; -1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="896" height="166" rx="14" fill="url(#bgGrad)"
        stroke="url(#borderGlow)" stroke-width="2"/>

  <circle cx="34" cy="34" r="6" fill="#ff5f56"/>
  <circle cx="56" cy="34" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="34" r="6" fill="#27c93f"/>
  <text x="450" y="39" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6b7280">muhammad@dev — zsh</text>

  <line x1="24" y1="52" x2="876" y2="52" stroke="#242430" stroke-width="1"/>

  <!-- Line 1: name -->
  <text x="40" y="92" font-family="'JetBrains Mono', monospace" font-size="26" fill="#22D3EE">
    <tspan fill="#7C3AED">$ </tspan>
    <tspan opacity="0">w<animate attributeName="opacity" to="1" dur="0.04s" begin="0.2s" fill="freeze"/></tspan>
    <tspan opacity="0">h<animate attributeName="opacity" to="1" dur="0.04s" begin="0.24s" fill="freeze"/></tspan>
    <tspan opacity="0">o<animate attributeName="opacity" to="1" dur="0.04s" begin="0.28s" fill="freeze"/></tspan>
    <tspan opacity="0">a<animate attributeName="opacity" to="1" dur="0.04s" begin="0.32s" fill="freeze"/></tspan>
    <tspan opacity="0">m<animate attributeName="opacity" to="1" dur="0.04s" begin="0.36s" fill="freeze"/></tspan>
    <tspan opacity="0">i<animate attributeName="opacity" to="1" dur="0.04s" begin="0.4s" fill="freeze"/></tspan>
  </text>

  <text x="40" y="92" font-family="'JetBrains Mono', monospace" font-size="26" font-weight="700" fill="#F8FAFC" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.3s" begin="0.9s" fill="freeze"/>
    <tspan x="60" dy="0">Muhammad Ibrahim</tspan>
  </text>

  <!-- Line 2: role, typed after -->
  <text x="40" y="130" font-family="'JetBrains Mono', monospace" font-size="18" fill="#22D3EE" opacity="0">
    <animate attributeName="opacity" to="1" dur="0.01s" begin="1.5s" fill="freeze"/>
    <tspan fill="#D4AF37">➜ </tspan>Full-Stack &amp; AI Developer
  </text>

  <!-- Blinking cursor -->
  <rect x="460" y="112" width="12" height="22" fill="#D4AF37" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" dur="0.9s" repeatCount="indefinite" begin="1.9s"/>
  </rect>
</svg>
