name: Update README Stats Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # regenerates once daily

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=mibrahim-O2&show_icons=true&theme=radical&bg_color=30,0e2a47,ffd700&title_color=fff&hide=stars&include_all_commits=false&border_radius=15
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=mibrahim-O2&layout=compact&langs_count=8&card_width=320&theme=radical&bg_color=30,0e2a47,ffd700&title_color=fff&border_radius=15
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "Update README stats cards"
          git push
