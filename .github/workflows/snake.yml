name: Generate Snake Contribution Animation
on:
  workflow_dispatch:
  schedule:
    # Runs once a day at midnight UTC to keep the snake fed with fresh commits
    - cron: "0 0 * * *"
permissions:
  contents: write
jobs:
  build-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: mibrahim-O2
          outputs: |
            dist/github-snake.svg?color_snake=%23D4AF37&color_dots=%23e6f4ea,%23a8d5b5,%2360b37a,%232ea44f,%230d1117
            dist/github-snake-dark.svg?color_snake=%23D4AF37&color_dots=%230d1117,%23144d29,%231f7a3d,%232ea44f,%23D4AF37
      - name: Push snake output to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
