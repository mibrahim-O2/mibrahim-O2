name: Generate Snake Contribution Animation

on:
  workflow_dispatch:
  schedule:
    # Runs once a day at midnight UTC to keep the snake fed with fresh commits
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation(s)
        uses: Platane/snk@v3
        with:
          github_user_name: mibrahim-O2
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-ocean.svg?color_snake=#00F5FF&color_dots=#0e2a47,#154c8c,#1f6fd6,#3ba0ff,#7fd7ff
            dist/github-snake.gif?color_snake=#FFD700&color_dots=#0e2a47,#154c8c,#1f6fd6,#3ba0ff,#7fd7ff

      - name: Push snake output to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
