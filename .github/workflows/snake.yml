name: Generate Snake Contribution Animation

on:
  workflow_dispatch:
  schedule:
    # Runs once a day at midnight UTC to keep the snake fed with fresh commits
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build-snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: mibrahim-O2
          outputs: |
            dist/github-snake.svg?color_snake=%23FFD700&color_dots=%23ebedf0,%23c6e48b,%2385c46b,%2344a340,%231e6823
            dist/github-snake-dark.svg?color_snake=%2300F5FF&color_dots=%230e1117,%230e2a47,%23154c8c,%231f6fd6,%2300F5FF

      - name: Push snake output to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
