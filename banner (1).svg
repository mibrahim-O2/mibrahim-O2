<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120f1e"/>
      <stop offset="55%" stop-color="#0c0a16"/>
      <stop offset="100%" stop-color="#181022"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#2cb1bc"/>
      <stop offset="100%" stop-color="#f2a65a"/>
    </linearGradient>
    <clipPath id="clipLine1">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" from="0" to="140" dur="0.6s" begin="0.3s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clipLine2">
      <rect x="0" y="0" width="0" height="55">
        <animate attributeName="width" from="0" to="420" dur="0.9s" begin="1.0s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clipLine3">
      <rect x="0" y="0" width="0" height="40">
        <animate attributeName="width" from="0" to="400" dur="0.8s" begin="2.1s" fill="freeze"/>
      </rect>
    </clipPath>
    <clipPath id="clipLine4">
      <rect x="0" y="0" width="0" height="35">
        <animate attributeName="width" from="0" to="500" dur="1s" begin="3.0s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <rect x="1.5" y="1.5" width="897" height="237" rx="14" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2"/>

  <rect x="1.5" y="1.5" width="897" height="38" rx="14" fill="#181228"/>
  <rect x="1.5" y="26" width="897" height="14" fill="#181228"/>

  <circle cx="28" cy="20" r="6" fill="#f2555a"/>
  <circle cx="50" cy="20" r="6" fill="#f2a65a"/>
  <circle cx="72" cy="20" r="6" fill="#5fd68d"/>
  <text x="450" y="25" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#6f6a86">muhammad-ibrahim &#8212; zsh &#8212; 88x20</text>

  <g font-family="'JetBrains Mono', monospace" xml:space="preserve">
    <g clip-path="url(#clipLine1)">
      <text x="40" y="90" font-size="24" fill="#2cb1bc">$ whoami</text>
    </g>

    <g clip-path="url(#clipLine2)">
      <text x="40" y="140" font-size="38" font-weight="700" fill="#f2a65a">Muhammad Ibrahim</text>
    </g>

    <g clip-path="url(#clipLine3)">
      <text x="40" y="180" font-size="22" fill="#5fd68d">Full-Stack &amp; AI Developer</text>
    </g>

    <g clip-path="url(#clipLine4)">
      <text x="40" y="212" font-size="16" fill="#a39cc7">Building things that ship, not just compile.</text>
    </g>
  </g>

  <rect x="345" y="190" width="10" height="22" fill="#f2a65a">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite" begin="4.1s"/>
  </rect>
</svg>
