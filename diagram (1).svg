<svg aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160">
  <title>Muhammad Ibrahim - Terminal Banner</title>
  <desc id="desc">Animated terminal window with typing effect</desc>
  
  
  <rect stroke-width="3" stroke="#21262d" fill="#0d1117" rx="12" height="160" width="900"></rect>
  
  
  <rect opacity="0.18" stroke-width="1" stroke="#39d353" fill="none" rx="9" height="152" width="892" y="4" x="4"></rect>

  
  <g>
    <circle fill="#ff5f57" r="7" cy="26" cx="28"></circle>
    <circle fill="#ffbd2e" r="7" cy="26" cx="52"></circle>
    <circle fill="#28c940" r="7" cy="26" cx="76"></circle>
  </g>

  
  <text fill="#8b949e" font-size="13.5" font-family="'JetBrains Mono', 'SF Mono', monospace" y="34" x="110">
    <tspan fill="#58a6ff">mibrahim</tspan>
    <tspan fill="#c9d1d9">@</tspan>
    <tspan fill="#39d353">dev</tspan>
    <tspan fill="#8b949e">:~$</tspan>
  </text>

  
  <text letter-spacing="-1.2px" fill="#39d353" font-size="31.5" font-family="'JetBrains Mono', 'SF Mono', monospace" y="78" x="110">
    
    <tspan>&gt;</tspan>
    
    
    <tspan opacity="0">M</tspan>
    <tspan opacity="0">u</tspan>
    <tspan opacity="0">h</tspan>
    <tspan opacity="0">a</tspan>
    <tspan opacity="0">m</tspan>
    <tspan opacity="0">m</tspan>
    <tspan opacity="0">a</tspan>
    <tspan opacity="0">d</tspan>
    
    <tspan opacity="0"> </tspan>
    
    <tspan opacity="0">I</tspan>
    <tspan opacity="0">b</tspan>
    <tspan opacity="0">r</tspan>
    <tspan opacity="0">a</tspan>
    <tspan opacity="0">h</tspan>
    <tspan opacity="0">i</tspan>
    <tspan opacity="0">m</tspan>
  </text>

  
  <rect opacity="1" fill="#39d353" height="33" width="3.5" y="61" x="628">
    
  </rect>

  
  <rect opacity="0.055" fill="url(#scan)" height="160" width="900"></rect>
  
  <defs>
    <linearGradient y2="100%" x2="0%" y1="0%" x1="0%" id="scan">
      <stop stop-color="#ffffff" offset="0%"></stop>
      <stop stop-color="#ffffff" offset="100%"></stop>
    </linearGradient>
  </defs>
</svg>
